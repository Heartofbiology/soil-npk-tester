<!DOCTYPE html>
<html>
<head>
    <title>Smart Soil Advisor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🌱 Smart Soil Intelligence System</h1>
</header>

<div class="container">

    <h2>Enter Soil Data</h2>

    <input type="number" id="n" placeholder="Nitrogen (1-10)" min="1" max="10">
    <input type="number" id="p" placeholder="Phosphorus (1-10)" min="1" max="10">
    <input type="number" id="k" placeholder="Potassium (1-10)" min="1" max="10">
    <input type="number" id="ph" placeholder="pH (1-14)" min="1" max="14">

    <!-- ✅ AUTO STATE -->
    <label>Select State</label>
    <select id="state"></select>

    <!-- ✅ AUTO DISTRICT -->
    <label>Select District</label>
    <select id="district"></select>

    <button onclick="analyze()">Analyze Soil</button>

</div>

<div id="result"></div>

<!-- ✅ IMPORTANT ORDER -->
<script src="locationData.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
